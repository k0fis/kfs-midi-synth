name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fetch TinyUSB dependencies
        run: cd lib/tinyusb && python3 tools/get_deps.py stm32f4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Build midi-synth
        run: cd midi-synth && make

      - name: Build sine-test
        run: cd sine-test && make

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            midi-synth/midi_synth.bin
            sine-test/sine_test.bin
          generate_release_notes: true
